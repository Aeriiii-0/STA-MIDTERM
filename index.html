<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Testing & Automation Master Simulator</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --accent-green: #2ea043;
            --accent-teal: #008080;
            --border-color: #30363d;
            --correct-bg: rgba(46, 160, 67, 0.15);
            --correct-border: #2ea043;
            --wrong-bg: rgba(248, 81, 73, 0.15);
            --wrong-border: #f85149;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .quiz-container {
            width: 100%;
            max-width: 700px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .stats-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .question-text {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-node {
            border: 1px solid var(--border-color);
            background-color: rgba(255,255,255,0.02);
            padding: 14px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.4;
        }

        .option-node:hover {
            border-color: var(--accent-color);
            background-color: rgba(88, 166, 255, 0.05);
        }

        .option-node.correct {
            border-color: var(--correct-border) !important;
            background-color: var(--correct-bg) !important;
            cursor: default;
        }

        .option-node.wrong {
            border-color: var(--wrong-border) !important;
            background-color: var(--wrong-bg) !important;
            cursor: default;
        }

        .option-node.disabled {
            cursor: default;
            opacity: 0.6;
        }
        
        .option-node.disabled:hover {
            border-color: var(--border-color);
            background-color: rgba(255,255,255,0.02);
        }

        .feedback-box {
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .feedback-box.correct {
            display: block;
            background-color: var(--correct-bg);
            border: 1px solid var(--correct-border);
        }

        .feedback-box.wrong {
            display: block;
            background-color: var(--wrong-bg);
            border: 1px solid var(--wrong-border);
        }

        .action-area {
            display: flex;
            justify-content: flex-end;
        }

        .results-view {
            text-align: center;
            padding: 20px 0;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent-teal);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 auto 20px auto;
        }

        button {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background-color: #30363d;
        }
    </style>
</head>

        },
        {
            q: "What document properties should you prioritize to ensure a test plan does not slow down engineering progress?",
            options: ["Rigid, long-form, and highly technical", "Concise, organized, readable, and flexible", "Monolithic, unchanging, and restricted", "Brief but ambiguous"],
            answer: 1,
            feedback: "Effective test plans are concise, organized, readable, flexible, and accurate[cite: 2]."
        },
        {
            q: "Who else uses the test plan besides the QA team to understand how an application will be verified?",
            options: ["External compliance auditors only", "Developers, Business Analysts, and Project Managers", "End consumers exclusively", "Database script automation modules"],
            answer: 1,
            feedback: "The test plan provides cross-team visibility for developers, PMs, and analysts alike[cite: 2]."
        },
        {
            q: "What distinct component is required in automated test case rows to evaluate if a feature passes or fails?",
            options: ["The corporate risk database index", "The expected result benchmark", "The environment maintenance timeline", "The team logistics schedule"],
            answer: 1,
            feedback: "The expected result provides the baseline metric to evaluate test success[cite: 2]."
        },
        {
            q: "What risk perspective identifies a software threat and immediately analyzes its downstream blast radius?",
            options: ["Cause perspective", "Effect perspective", "Likelihood perspective", "Scope perspective"],
            answer: 1,
            feedback: "The Effect perspective traces a condition forward to assess its dynamic impact[cite: 2]."
        }
    ];

    let activeQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let wrongPool = [];
    let isReviewMode = false;
    let hasAnsweredCurrent = false;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz(targetBank) {
        activeQuestions = shuffleArray(JSON.parse(JSON.stringify(targetBank)));
        currentIndex = 0;
        score = 0;
        wrongPool = [];
        hasAnsweredCurrent = false;
        renderQuestion();
    }

    function renderQuestion() {
        const container = document.getElementById("quiz-window");
        if (currentIndex >= activeQuestions.length) {
            renderResults();
            return;
        }

        hasAnsweredCurrent = false;
        const currentQ = activeQuestions[currentIndex];

        container.innerHTML = `
            <div class="stats-hud">
                <span>Progress: ${currentIndex + 1} / ${activeQuestions.length}</span>
                <span>Correct: ${score}</span>
            </div>
            <div class="question-text">${escapeHtml(currentQ.q)}</div>
            <div class="options-container" id="options-box">
                ${currentQ.options.map((opt, idx) => `
                    <div class="option-node" id="opt-${idx}" onclick="handleOptionSelection(${idx})">
                        <strong>${String.fromCharCode(65 + idx)}.</strong> ${escapeHtml(opt)}
                    </div>
                `).join('')}
            </div>
            <div class="feedback-box" id="feedback-node"></div>
            <div class="action-area" id="action-node"></div>
        `;
    }

    function handleOptionSelection(selectedIndex) {
        if (hasAnsweredCurrent) return;
        hasAnsweredCurrent = true;

        const currentQ = activeQuestions[currentIndex];
        const feedbackNode = document.getElementById("feedback-node");
        const actionNode = document.getElementById("action-node");
        const nodes = document.querySelectorAll(".option-node");

        nodes.forEach((node, idx) => {
            if (idx !== selectedIndex && idx !== currentQ.answer) {
                node.classList.add("disabled");
            }
        });

        if (selectedIndex === currentQ.answer) {
            document.getElementById(`opt-${selectedIndex}`).classList.add("correct");
            feedbackNode.className = "feedback-box correct";
            feedbackNode.innerHTML = `<strong>🟢 Correct!</strong> ${escapeHtml(currentQ.feedback)}`;
            score++;
            // Update HUD score immediately
            document.querySelector(".stats-hud").innerHTML = `
                <span>Progress: ${currentIndex + 1} / ${activeQuestions.length}</span>
                <span>Correct: ${score}</span>
            `;
        } else {
            document.getElementById(`opt-${selectedIndex}`).classList.add("wrong");
            document.getElementById(`opt-${currentQ.answer}`).classList.add("correct");
            feedbackNode.className = "feedback-box wrong";
            feedbackNode.innerHTML = `<strong>🔴 Incorrect.</strong> ${escapeHtml(currentQ.feedback)}`;
            
            if (!wrongPool.some(item => item.q === currentQ.q)) {
                wrongPool.push(currentQ);
            }
        }

        // Display the navigation action button
        actionNode.innerHTML = `<button id="next-btn" onclick="moveToNextQuestion()">Next Question (Enter)</button>`;
        document.getElementById("next-btn").focus();
    }

    function moveToNextQuestion() {
        currentIndex++;
        renderQuestion();
    }

    // Capture Enter key interactions
    window.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            const nextButton = document.getElementById("next-btn");
            if (nextButton) {
                event.preventDefault();
                nextButton.click();
            }
        }
    });

    function renderResults() {
        const container = document.getElementById("quiz-window");
        const basePct = Math.round((score / activeQuestions.length) * 100);

        container.innerHTML = `
            <div class="results-view">
                <div class="score-circle">${basePct}%</div>
                <p style="margin-bottom: 25px; font-size: 1.1rem;">You successfully cleared <strong>${score}</strong> out of <strong>${activeQuestions.length}</strong> items.</p>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button onclick="restartGlobal()">Full Reset Simulator</button>
                    ${wrongPool.length > 0 ? `<button class="btn-secondary" onclick="startWrongPoolReview()">Review Incorrect Items (${wrongPool.length})</button>` : ''}
                </div>
            </div>
        `;
    }

    function restartGlobal() {
        isReviewMode = false;
        initQuiz(masterBank);
    }

    function startWrongPoolReview() {
        const nextTarget = [...wrongPool];
        isReviewMode = true;
        initQuiz(nextTarget);
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    initQuiz(masterBank);
</script>

</body>
</html>

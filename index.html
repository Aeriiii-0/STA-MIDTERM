<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rizal Practice Quiz | Chapters 1–6</title>
    <style>
        :root {
            --bg-color: #0b1319;
            --card-bg: #13222d;
            --accent-teal: #00e5ff;
            --accent-green: #00e676;
            --text-main: #e0f2fe;
            --text-muted: #94a3b8;
            --border-color: #1e3a8a33;
            --option-bg: #1c2d3d;
            --option-hover: #263d52;
            --correct-bg: #064e3b;
            --correct-border: #10b981;
            --wrong-bg: #881337;
            --wrong-border: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header-bar {
            background-color: #0d1a24;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(0, 229, 255, 0.2);
        }

        .stats-left {
            display: flex;
            gap: 20px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-teal);
        }

        .score-box {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.1), rgba(0, 230, 118, 0.1));
            border: 1px solid var(--accent-green);
            padding: 8px 16px;
            border-radius: 8px;
            text-align: right;
        }

        .score-box .stat-value {
            color: var(--accent-green);
        }

        .quiz-body {
            padding: 30px 24px;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--option-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            padding: 16px;
            border-radius: 10px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not([disabled]) {
            background-color: var(--option-hover);
            border-color: var(--accent-teal);
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background-color: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            color: #ecfdf5;
        }

        .option-btn.wrong {
            background-color: var(--wrong-bg) !important;
            border-color: var(--wrong-border) !important;
            color: #fff1f2;
        }

        .option-btn:disabled {
            cursor: default;
            opacity: 0.8;
        }

        .feedback-container {
            margin-top: 20px;
            min-height: 24px;
            font-weight: 600;
            font-size: 1.05rem;
        }

        .feedback-correct {
            color: var(--accent-green);
        }

        .feedback-wrong {
            color: #f43f5e;
        }

        .footer-bar {
            padding: 20px 24px;
            background-color: #0d1a24;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .next-btn {
            background: linear-gradient(135deg, #00e5ff, #00e676);
            color: #0b1319;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .next-btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .next-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #334155;
            color: #94a3b8;
        }

        .completion-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .completion-screen h2 {
            font-size: 2rem;
            color: var(--accent-teal);
            margin-bottom: 12px;
        }

        .completion-screen p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #00e5ff, #00e676);
            color: #0b1319;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header-bar">
        <div class="stats-left">
            <div class="stat-box">
                <span class="stat-label">Total</span>
                <span class="stat-value" id="total-questions">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Answered</span>
                <span class="stat-value" id="answered-count">0</span>
            </div>
        </div>
        <div class="score-box">
            <span class="stat-label">Current Score</span>
            <div class="stat-value" id="score-display">0</div>
        </div>
    </div>

    <div class="quiz-body" id="quiz-body">
        <div class="question-text" id="question-text">Loading question...</div>
        <div class="options-grid" id="options-grid"></div>
        <div class="feedback-container" id="feedback"></div>
    </div>

    <div class="footer-bar" id="footer-bar">
        <button class="next-btn" id="next-btn" disabled>Next</button>
    </div>
</div>

<script>
const rawQuestions = [
    // Chapter 1
    { q: "On what exact day of the week and date was Jose Rizal born?", options: ["Monday, June 19, 1861", "Wednesday, June 19, 1861", "Friday, June 22, 1861", "Wednesday, June 22, 1861"], answer: 1 },
    { q: "Who was the parish priest that baptized Jose Rizal on June 22, 1861?", options: ["Father Pedro Casanas", "Father Francisco de Paula Sanchez", "Father Rufino Collantes", "Father Leoncio Lopez"], answer: 2 },
    { q: "Why did Doña Teodora nearly die during the delivery of Jose Rizal?", options: ["She suffered from high blood pressure.", "Jose had an unusually large head.", "There was no physician present in Calamba.", "She was severely ill with malaria."], answer: 1 },
    { q: "What is the literal meaning of the surname \"Rizal\" (derived from the Spanish word ricial)?", options: ["Market or marketplace", "Green field or wheat field that sprouts again", "Land of noble birth", "Wisdom and knowledge"], answer: 1 },
    { q: "Jose Rizal was named \"Jose\" by his mother in honor of which saint?", options: ["St. Joseph", "St. John the Baptist", "St. Protacio", "St. Jude"], answer: 0 },
    { q: "Where did Doña Teodora Alonso Realonda complete her formal education?", options: ["Colegio de La Concordia", "University of Santo Tomas", "Colegio de Santa Rosa", "Ateneo Municipal"], answer: 2 },
    { q: "In the birth order of the eleven (11) Rizal siblings, what was Jose’s exact position?", options: ["5th", "6th", "7th", "8th"], answer: 2 },
    { q: "Which among the Rizal siblings died at the age of three (3), causing Jose his \"first sorrow in life\"?", options: ["Saturnina", "Concepcion", "Josefa", "Soledad"], answer: 1 },
    { q: "Who was Jose Rizal's only brother, who later became a General in the Philippine Revolution?", options: ["Manuel", "Antonio", "Paciano", "Francisco"], answer: 2 },
    { q: "Jose Rizal’s paternal great-great-grandfather, Domingo Lam-co, was a Chinese immigrant who originated from where?", options: ["Canton, China", "Changchow, China", "Fujian, China", "Macao, China"], answer: 1 },
    { q: "Why did Domingo Lam-co change his original family surname to \"Mercado\" in 1731?", options: ["To comply with a Spanish decree issued by Governor-General Claveria.", "To match his business as a merchant and avoid anti-Chinese prejudice.", "Because he was adopted by a Spanish family.", "To honor his Filipino mother-in-law."], answer: 1 },
    { q: "On his mother’s side, Jose Rizal’s ancestor Eugenio Ursua had roots from which country?", options: ["Spain", "Japan", "China", "India"], answer: 1 },
    { q: "To which social class did the Rizal family belong in Calamba, signifying their status as wealthy landowners and educated citizens?", options: ["Insulares", "Peninsulares", "Principalia", "Indios"], answer: 2 },

    { q: "Under what system did the Rizal family cultivate their agricultural lands in Calamba?", options: ["They owned the entire hacienda outright.", "They were inquilinos (tenants) renting land owned by the Dominican Order.", "They were forced laborers under the polo y servicio system.", "They managed lands directly owned by the Governor-General."], answer: 1 },

    // Chapter 2
    { q: "At what age did Jose Rizal write his very first Tagalog poem, Sa Aking Mga Kabata?", options: ["6 years old", "8 years old", "10 years old", "12 years old"], answer: 1 },
    { q: "Which prominent landmark near Calamba inspired young Jose's love for nature and served as the setting for many of his childhood memories?", options: ["Mount Banahaw", "Mount Makiling", "Mount Mayon", "Mount Taal"], answer: 1 },
    { q: "What was the title of the famous poem written by Rizal at the age of 15 while studying at Ateneo, dedicating his fondest memories to his hometown?", options: ["A La Juventud Filipina", "Un Recuerdo a Mi Pueblo", "Mi Ultimo Adios", "A Filipinas"], answer: 1 },
    { q: "What term did the local townspeople and parish priest use to fondly call young Jose because of his deep religious devotion and frequent visits to the church?", options: ["Pepe", "Manong Jose", "El Doctor", "JoseIto"], answer: 1 },
    { q: "What imaginary or mythical creatures did Jose’s personal nurse (aya) use to scare him into eating his supper at night?", options: ["Tikbalang, Aswang, and Nuno sa Punso", "Kapre, Sirena, and Duwende", "Manananggal, Bakunawa, and Tiyanak", "Engkanto, Santelmo, and Bungisngis"], answer: 0 },
    { q: "On June 6, 1868, Jose and his father went on a pilgrimage to fulfill a vow made by Doña Teodora. Which famous shrine did they visit?", options: ["Our Lady of Manaoag in Pangasinan", "Our Lady of Peace and Good Voyage in Antipolo", "The Black Nazarene in Quiapo", "The Holy Child in Cebu"], answer: 1 },
    { q: "During their trip to Antipolo in 1868, what mode of water transport did Jose and Don Francisco use to navigate the Pasig River?", options: ["Bapor Tabo", "Casco", "Galleon", "Felucca"], answer: 1 },
    { q: "While reading El Amigo de los Niños (The Children’s Friend) with his mother, which story left a profound, lifelong impression on young Jose?", options: ["The Story of the Greedy Dog", "The Story of the Foolish Turtle", "The Story of the Young Moth", "The Story of the Boy Who Cried Wolf"], answer: 2 },
    { q: "Who was the parish priest of Calamba who served as an intellectual mentor to young Jose, instilling in him a love for truth and philosophy?", options: ["Father Pedro Casanas", "Father Leoncio Lopez", "Father Rufino Collantes", "Father Jose Burgos"], answer: 1 },
    { q: "At age eight, Rizal wrote a Tagalog drama (sarswela). The Gobernadorcillo of which neighboring town bought the manuscript for two pesos (₱2.00) to perform at their local fiesta?", options: ["Biñan", "Paete", "Santa Cruz", "Los Baños"], answer: 1 },
    { q: "Which uncle of Rizal—a scholar educated in Europe and India—encouraged his love for the arts, painting, and nature?", options: ["Tio Manuel", "Tio Gregorio", "Tio Jose Alberto", "Tio Antonio"], answer: 2 },
    { q: "Which uncle focused on developing Jose’s frail physical body by teaching him swimming, fencing, wrestling, and martial arts?", options: ["Tio Jose Alberto", "Tio Manuel", "Tio Gregorio", "Tio Pedro"], answer: 1 },
    { q: "Which uncle, an avid reader, encouraged Jose to read good books, study tirelessly, and observe life keen-sightedly?", options: ["Tio Gregorio", "Tio Manuel", "Tio Jose Alberto", "Tio Lorenzo"], answer: 0 },
    { q: "What was the primary reason Doña Teodora built a small cottage in their backyard specifically for Jose?", options: ["So he could study Latin without distraction.", "To give him a place to play during the day and observe birds and nature.", "To isolate him when he was sick.", "To serve as an art studio for his sculptures."], answer: 1 },
    { q: "What famous line from the poem Sa Aking Mga Kabata reflects Rizal's early appreciation for national identity through language?", options: ["\"Bella esperanza de la Patria mia.\"", "\"Ang hindi magmahal sa kanyang salita, mahigit sa hayop at malansang isda.\"", "\"El que no sabe mirar atras no llegara a su destino.\"", "\"Juventud filipina, ten fe en tu destino.\""], answer: 1 },

    // Chapter 3
    { q: "Who was Jose Rizal’s third home tutor who lived in the Rizal house to teach him Spanish and Latin, but died five months later?", options: ["Maestro Celestino", "Maestro Lucas Padua", "Leon Monroy", "Maestro Justiniano Aquino Cruz"], answer: 2 },
    { q: "In June 1869, how did Jose travel from Calamba to Biñan to begin his formal education?", options: ["On horseback with his father Don Francisco", "By carromata (kalesa) accompanied by his brother Paciano", "By casco along the Laguna de Bay", "On foot accompanied by his Tio Manuel"], answer: 1 },
    { q: "With whom did Jose stay while attending school in Biñan?", options: ["His aunt, Tia Tomasa", "His uncle, Tio Jose Alberto", "His art teacher, Old Juancho", "His former tutor, Maestro Lucas Padua"], answer: 0 },
    { q: "How did Rizal describe his teacher in Biñan, Maestro Justiniano Aquino Cruz?", options: ["A gentle and soft-spoken friar who rarely punished students", "A tall, thin, slightly bent man who was a strict disciplinarian", "A young Spanish professor from the University of Santo Tomas", "A retired military officer who taught using strict drills"], answer: 1 },
    { q: "On his very first day of school, why did Pedro (the teacher’s son) and other classmates laugh at Jose?", options: ["Because Jose was wearing worn-out clothes from Calamba.", "Because Jose spoke no Tagalog at all.", "Because Jose answered \"Un poco, señor\" when asked if he knew Spanish and Latin.", "Because Jose tripped and fell in front of the classroom."], answer: 2 },
    { q: "How did Jose defeat the taller and bigger Pedro in a fistfight after class on his first day?", options: ["He used wrestling techniques taught to him by his Tio Manuel.", "Paciano intervened and fought Pedro for him.", "He used a wooden stick he found in the schoolyard.", "Pedro slipped on the mud and surrendered immediately."], answer: 0 },
    { q: "In an arm-wrestling match (bunong-braso) after class, who defeated Jose, nearly cracking Jose's head against the sidewalk?", options: ["Pedro", "Andres Salandanan", "Jose Guevarra", "Arturo Camps"], answer: 1 },
    { q: "Who was \"Old Juancho,\" and how did he support young Jose's artistic talent?", options: ["He was the parish priest who bought Jose’s religious drawings.", "He was Maestro Justiniano’s father-in-law who gave free drawing and painting lessons to Jose and Jose Guevarra.", "He was a carpenter who built Jose’s easel and paintbrushes.", "He was a merchant from Manila who brought Jose oil paints."], answer: 1 },
    { q: "On December 17, 1870, what steamer did Jose board to return home to Calamba from Biñan?", options: ["Bapor Tabo", "Talim", "España", "Isla de Panay"], answer: 1 },
    { q: "Who was Arturo Camps, the man who accompanied Jose during his boat trip back to Calamba?", options: ["A Spanish civil guard officer", "A French friend of Jose's father", "A Dominican friar from UST", "A classmate’s older brother from Biñan"], answer: 1 },
    { q: "Why did Maestro Justiniano advise Jose in December 1870 that it was time for him to leave the school in Biñan?", options: ["Because Jose was expelled for getting into too many fights.", "Because Jose had already learned everything the school could teach him.", "Because the school was closing down due to lack of funds.", "Because Jose's parents could no longer afford the tuition fees."], answer: 1 },
    { q: "In 1871, Doña Teodora was falsely accused of attempting to poison which family member?", options: ["Her husband, Don Francisco", "Her brother’s estranged wife, Teodora Formoso", "The mayor of Calamba, Antonio Vivencio del Rosario", "Her sister-in-law, Tia Tomasa"], answer: 1 },
    { q: "As part of her cruel punishment before being imprisoned, how far was Doña Teodora forced to walk barefoot by Spanish authorities?", options: ["10 kilometers from Calamba to Biñan", "50 kilometers from Calamba to the provincial jail in Santa Cruz", "100 kilometers from Laguna to Manila", "25 kilometers from Calamba to Los Baños"], answer: 1 },
    { q: "How long was Doña Teodora imprisoned before being fully acquitted by the Supreme Court (Audiencia)?", options: ["6 months", "1 year", "2 ½ years", "5 years"], answer: 2 },
    { q: "The martyrdom of the three priests—Gomez, Burgos, and Zamora (GOMBURZA)—on February 17, 1872, deeply affected the Rizal family primarily because:", options: ["Father Burgos was a close friend, teacher, and housemate of Jose's brother, Paciano.", "Father Gomez was Jose's godfather during his baptism.", "The execution took place inside the town square of Calamba.", "Don Francisco was arrested alongside the three priests."], answer: 0 },

    // Chapter 4
    { q: "What was the former name of Ateneo Municipal before it was handed over to the Jesuits?", options: ["Colegio de San Juan de Letran", "Escuela Pia (Charity School)", "Universidad de San Ignacio", "Colegio de Santa Rosa"], answer: 1 },
    { q: "Why was Jose Rizal initially refused admission to Ateneo Municipal by the registrar, Father Magin Ferrando?", options: ["He failed the entrance examinations in Christian Doctrine and Spanish.", "He was sickly, undersized for his age, and arrived late for registration.", "His mother was still in prison in Santa Cruz, Laguna.", "His father had not paid the required enrolment fees."], answer: 1 },
    { q: "Who intervened and helped Jose get accepted into Ateneo Municipal despite the registrar's initial rejection?", options: ["Manuel Xerez Burgos (nephew of Father Jose Burgos)", "Father Francisco de Paula Sanchez", "Father Jose Bech", "Paciano Rizal"], answer: 0 },
    { q: "Why did Jose use the surname \"Rizal\" for the first time when he registered at Ateneo?", options: ["His father ordered him to do so because the surname \"Mercado\" had become suspicious to Spanish authorities due to Paciano's ties to Father Burgos.", "The Jesuits required all new students to adopt a Spanish surname.", "He wanted to hide his identity from his former classmates in Biñan.", "The Governor-General issued a decree forcing his family to change names."], answer: 0 },
    { q: "How were the students divided inside the classroom under the Jesuit educational system at Ateneo?", options: ["Into Peninsulares (Spanish-born) and Indios (Filipinos)", "Into two \"Empires\": the Roman Empire (internos/boarders) and the Carthaginian Empire (externos/non-boarders)", "Into the Athenians and the Spartans", "Into Seniors and Juniors based on age"], answer: 1 },
    { q: "What was the highest rank or title awarded to the best student within an \"Empire\" at Ateneo?", options: ["Centurion", "Tribune", "Emperor", "Decurion"], answer: 2 },
    { q: "Who was Jose Rizal's first professor at Ateneo, described as a \"tall, thin man, with a body slightly bent forward\"?", options: ["Father Francisco de Paula Sanchez", "Father Jose Bech", "Father Magin Ferrando", "Father Pablo Ramon"], answer: 1 },
    { q: "What was the color of the uniform worn by Ateneo students in Rizal’s time, which consisted of hemp-fabric trousers and a striped cotton coat?", options: ["Pure white", "Rayadillo", "Dark navy blue", "Khaki"], answer: 1 },
    { q: "During his second year at Ateneo (1873–1874), what famous series of historical novels by Alexander Dumas did Jose read and deeply admire?", options: ["Les Misérables", "The Count of Monte Cristo", "Don Quixote", "The Three Musketeers"], answer: 1 },
    { q: "Which Jesuit priest did Rizal consider his finest professor, describing him as a \"model of uprightness, earnestness, and love for the advancement of his pupils\"?", options: ["Father Jose Bech", "Father Francisco de Paula Sanchez", "Father Magin Ferrando", "Father Jose Vilaclara"], answer: 1 },
    { q: "What religious society at Ateneo was Rizal a member of, eventually becoming its Secretary due to his exemplary devotion?", options: ["Knights of Columbus", "Academy of Spanish Literature", "Marian Congregation (Sodality of Our Lady)", "Brotherhood of the Holy Sepulchre"], answer: 2 },
    { q: "Under whose guidance did Rizal carve the famous image of the Sacred Heart of Jesus using a pocket knife on a piece of batikuling wood?", options: ["Romualdo de Jesus", "Father Lleonart", "Don Augustin Saez", "Maestro Justiniano"], answer: 1 },
    { q: "What was the title of the poem written by Rizal in 1875 upon the request of his mother, expressing her joy over her release from prison?", options: ["Un Recuerdo a Mi Pueblo", "Mi Primera Inspiracion (My First Inspiration)", "A La Juventud Filipina", "Al Niño Jesus"], answer: 1 },
    { q: "On March 23, 1877, Jose Rizal graduated from Ateneo Municipal at the age of 15. What diploma degree did he receive?", options: ["Doctor of Medicine", "Bachelor of Arts (Bachiller en Artes)", "Licentiate in Philosophy", "Surveyor and Agricultural Expert"], answer: 1 },
    { q: "What final academic rating/grade did Rizal achieve in ALL his subjects upon graduating from Ateneo Municipal?", options: ["Aprobado (Passed)", "Bueno (Good)", "Sobresaliente (Excellent)", "Meritissimo (Very Good)"], answer: 2 },

    // Chapter 5
    { q: "What was Doña Teodora’s initial reaction when Don Francisco decided to send Jose to the University of Santo Tomas for higher studies?", options: ["She strongly opposed it, fearing Jose would end up executed like the GOMBURZA if he learned more.", "She was overjoyed and pledged to accompany him to Manila.", "She urged him to become a priest instead.", "She insisted he study in Spain immediately."], answer: 0 },

    { q: "What secret pseudonym did Jose Rizal and Leonor Rivera use in their love letters to conceal their romantic relationship?", options: ["\"Orang\" and \"Pepe\"", "\"Taimis\" and \"Jose\"", "\"Laong Laan\" and \"Dimasalang\"", "\"Miss L\" and \"Manong\""], answer: 1 },
    { q: "How did Rizal write his secret love letters to Leonor Valenzuela (\"Orang\") so that only she could read them?", options: ["Using a secret cipher code given by Paciano.", "Using invisible ink made of common salt and water that revealed text when held over a lamp.", "Writing in backward Latin script.", "Using lemon juice and feather pens."], answer: 1 },

    { q: "In 1880, Rizal won first prize for his allegorical play El Consejo de los Dioses. Why was there an outrage among Spanish spectators during the awarding?", options: ["Rizal criticized the Catholic Church inside the play.", "They discovered the winner was an \"Indio\" (Filipino) whose score beat Spanish writers.", "Rizal failed to attend the ceremony in person.", "The play was written in Tagalog instead of Spanish."], answer: 1 },
    { q: "What secret society of Filipino students at UST was founded by Rizal in 1880 to protect themselves against hostile Spanish students?", options: ["Katipunan", "Compañerismo (The Companionship)", "La Liga Filipina", "Circulo Hispano-Filipino"], answer: 1 },
    { q: "Which of the following was NOT a major reason why Rizal decided to leave UST and continue his medical studies in Spain in 1882?", options: ["The Dominican professors were hostile and discriminatory toward Filipino students.", "The teaching methods were outdated and repressive.", "He was expelled from UST for leading a student riot.", "He wanted to specialize in ophthalmology abroad to cure his mother's blindness."], answer: 2 },

    // Chapter 6
    { q: "What was the \"secret mission\" of Jose Rizal in traveling to Europe, which was agreed upon with his brother Paciano?", options: ["To purchase modern weapons for a planned armed revolution in Calamba.", "To observe the life, culture, laws, and governments of European nations in order to prepare himself for liberating his oppressed people.", "To seek asylum from the Spanish King against the Dominican friars.", "To establish a medical clinic in Madrid to support his family financially."], answer: 1 },
    { q: "What alias/passport name did Jose Rizal use when he left Manila for Spain to avoid detection by Spanish authorities and friars?", options: ["Dimasalang", "Jose Mercado", "Laong Laan", "Pepe Realonda"], answer: 1 },
    { q: "On May 3, 1882, what Spanish steamer did Rizal board from Manila bound for Singapore?", options: ["Djemnah", "Salvadora", "Isla de Panay", "Colombo"], answer: 1 },
    { q: "During his stopover in Singapore, at which hotel did Rizal stay for two days to sightsee the city?", options: ["Raffles Hotel", "Hotel de La Paz", "Hotel de Paris", "Grand Hotel"], answer: 1 },
    { q: "At Point de Galle, Ceylon (now Sri Lanka), how did Rizal describe the town in his diary?", options: ["\"A bustling, vibrant metropolis of trade\"", "\"A picturesque but lonely, quiet, and sad town\"", "\"The most beautiful seaport in Asia\"", "\"A hot and overcrowded fortress\""], answer: 1 },
    { q: "What was the first nationalistic essay written by Rizal on European soil, published in Basilio Teodoro Moran’s newspaper Diariong Tagalog?", options: ["A La Juventud Filipina", "Amor Patrio (Love of Country)", "Los Viajes (Travels)", "Revista de Madrid"], answer: 1 },

    { q: "Upon arriving in Madrid in November 1882, in which prestigious university did Rizal enroll to pursue courses in Medicine and Philosophy and Letters?", options: ["Universidad de Barcelona", "Universidad Central de Madrid", "Universidad de Salamanca", "Universidad de Sevilla"], answer: 1 },
    { q: "In Madrid, Rizal joined a society of Spaniards and Filipinos advocating reforms for the Philippines. What was the name of this organization?", options: ["Compañerismo", "Circulo Hispano-Filipino", "La Liga Filipina", "Katipunan"], answer: 1 },
    { q: "Who was the daughter of Don Pablo Ortiga y Rey (former City Mayor of Manila) with whom Rizal had a brief romance while in Madrid?", options: ["Segunda Katigbak", "Consuelo Ortiga y Perez", "Leonor Rivera", "Gertrude Beckett"], answer: 1 },
    { q: "Why did Rizal deliberately step back and stop his romance with Consuelo Ortiga y Perez?", options: ["He was ordered by Paciano to focus strictly on his studies.", "He was still engaged to Leonor Rivera, and his friend Eduardo de Lete was deeply in love with Consuelo.", "Consuelo’s father forbade her from dating an Indio.", "Consuelo decided to enter the convent."], answer: 1 },
    { q: "In 1883, Rizal joined the Masonic lodge Acacia in Madrid. What was his primary motive for becoming a Freemason?", options: ["To gain financial loans to publish his novels.", "To secure the aid of international Freemasons in his fight against the abusive friars in the Philippines.", "To abandon his Catholic faith completely.", "To learn political military strategies."], answer: 1 },
    { q: "On June 25, 1884, Rizal delivered a famous banquet speech (Brindis) at Restaurant Ingles to celebrate the double artistic victory of which two Filipino painters?", options: ["Juan Luna (Spoliarium) and Felix Resurreccion Hidalgo (Virgenes Cristianas Expuestas al Populacho)", "Antonio Luna and Fernando Amorsolo", "Juan Luna and Damian Domingo", "Felix Resurreccion Hidalgo and Jose Honorato Lozano"], answer: 0 },
    { q: "In his famous Brindis speech in 1884, what key idea did Rizal emphasize regarding human genius?", options: ["Genius can only flourish under European education.", "Genius is not the exclusive monopoly of any race, as both Spain and the Philippines produce great minds.", "Genius requires total independence from religious doctrine.", "Genius is inherited solely from noble ancestors."], answer: 1 },
    { q: "In June 1885, Rizal completed his studies at Universidad Central de Madrid and was awarded the degree of Licentiate in Medicine. Why was he NOT granted his formal Doctor’s diploma?", options: ["He failed his final clinical examination in surgery.", "He did not present his doctoral thesis and failed to pay the required diploma fees.", "The Spanish government revoked his degree due to his speech at the banquet.", "He chose not to attend the graduation ceremony."], answer: 1 }
];

let questions = [];
let currentIndex = 0;
let score = 0;
let answeredCount = 0;
let hasAnsweredCurrent = false;

function shuffleArray(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function initQuiz() {
    questions = shuffleArray(rawQuestions);
    currentIndex = 0;
    score = 0;
    answeredCount = 0;
    hasAnsweredCurrent = false;

    document.getElementById('total-questions').innerText = questions.length;
    document.getElementById('answered-count').innerText = answeredCount;
    document.getElementById('score-display').innerText = score;
    document.getElementById('footer-bar').style.display = 'flex';

    loadQuestion();
}

function loadQuestion() {
    hasAnsweredCurrent = false;
    document.getElementById('feedback').innerText = '';
    document.getElementById('next-btn').disabled = true;

    const currentQ = questions[currentIndex];
    document.getElementById('question-text').innerText = `${currentIndex + 1}. ${currentQ.q}`;

    const optionsGrid = document.getElementById('options-grid');
    optionsGrid.innerHTML = '';

    currentQ.options.forEach((optionText, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = optionText;
        btn.onclick = () => selectOption(idx);
        optionsGrid.appendChild(btn);
    });
}

function selectOption(selectedIdx) {
    if (hasAnsweredCurrent) return;
    hasAnsweredCurrent = true;

    const currentQ = questions[currentIndex];
    const optionsGrid = document.getElementById('options-grid');
    const buttons = optionsGrid.children;
    const feedback = document.getElementById('feedback');

    answeredCount++;
    document.getElementById('answered-count').innerText = answeredCount;

    if (selectedIdx === currentQ.answer) {
        score++;
        document.getElementById('score-display').innerText = score;
        buttons[selectedIdx].classList.add('correct');
        feedback.innerHTML = '<span class="feedback-correct">✓ Correct!</span>';
    } else {
        buttons[selectedIdx].classList.add('wrong');
        buttons[currentQ.answer].classList.add('correct');
        feedback.innerHTML = `<span class="feedback-wrong">✗ Incorrect. Correct answer: ${currentQ.options[currentQ.answer]}</span>`;
    }

    for (let btn of buttons) {
        btn.disabled = true;
    }

    document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
    if (!hasAnsweredCurrent) return;

    currentIndex++;
    if (currentIndex < questions.length) {
        loadQuestion();
    } else {
        showCompletionScreen();
    }
}

function showCompletionScreen() {
    const quizBody = document.getElementById('quiz-body');
    document.getElementById('footer-bar').style.display = 'none';

    const percentage = Math.round((score / questions.length) * 100);

    quizBody.innerHTML = `
        <div class="completion-screen">
            <h2>Quiz Completed!</h2>
            <p>You scored <strong>${score}</strong> out of <strong>${questions.length}</strong> (${percentage}%).</p>
            <button class="restart-btn" onclick="initQuiz()">Try Again (Reshuffle)</button>
        </div>
    `;
}

document.getElementById('next-btn').addEventListener('click', nextQuestion);

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        if (hasAnsweredCurrent && currentIndex < questions.length) {
            nextQuestion();
        }
    }
});

// Start the quiz on load
initQuiz();
</script>
